{% extends 'base.html' %}
{% block title %}Raise Dispute – FreelanceMarket{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:560px;">
    <div class="mb-4">
        <div class="section-label">Support</div>
        <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:900;">Raise a Dispute</h1>
        <p style="color:var(--text-muted);">For order: <strong>{{ order.gig.title }}</strong></p>
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="fm-card">
            <div class="alert alert-danger mb-4" style="font-size:0.85rem;">
                <i class="bi bi-shield-exclamation me-2"></i>
                A dispute will pause this order and notify our admin team for review.
            </div>
            <div class="mb-4">
                <label class="form-label">Reason for Dispute *</label>
                <textarea name="reason" class="fm-form-control w-100" rows="5"
                          placeholder="Explain the issue clearly. What did the seller fail to deliver? Include any relevant details." required></textarea>
            </div>
            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-accent" style="padding:0.7rem 2rem;background:var(--accent);">
                    <i class="bi bi-flag me-1"></i>Submit Dispute
                </button>
                <a href="{% url 'my_orders' %}" class="btn btn-outline-accent" style="padding:0.7rem 1.5rem;">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
